name: Deploy API to Hugging Face Spaces

on:
  push:
    branches:
      - main
    paths:
      - "modelservedapi/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push modelservedapi to HF Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git remote add hf https://atomik31:$HF_TOKEN@huggingface.co/spaces/atomik31/model-serv-api
          git subtree push --prefix modelservedapi hf main
